    <title>Galeri Album | Blok M Studio</title>
    <link rel="icon" type="image/png" href="assets/logopovicon.png">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Premium print album collections by BLOK M Studio. Preview the portfolio for Studio Portraits, Wedding Albums, Pre-Wedding Albums, and School Yearbooks.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <script src="lang-switcher.js"></script>

<body class="gallery-body">

    <!-- Floating Navbar -->
    <header class="main-header">
        <div class="logo-area">
            <img src="assets/logo-white.png" alt="BLOK M Studio Logo" class="logo-img">
        </div>
        
        <div class="header-right">
            <a href="index.html" class="back-home-btn">
                <span class="btn-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </span>
                <span lang="id">KEMBALI KE BERANDA</span>
                <span lang="en">BACK TO HOME</span>
            </a>
        </div>
    </header>

    <!-- Main Container -->
    <main class="gallery-container">
        
        <!-- Dynamic Header Text Overlay -->
        <section class="gallery-heading-area">
            <span class="gallery-tag" id="gallery-subtitle">BLOK M STORIES</span>
            <h1 class="gallery-title" id="gallery-title">ALBUM GALLERY</h1>
            <p class="gallery-desc" id="gallery-desc">Loading photo albums...</p>
        </section>

        <!-- Scrolling Photo Walls (3 Rows) -->
        <section class="photo-wall-section">
            
            <!-- Row 1: Sliding Left -->
            <div class="marquee-row row-left" id="row-1">
                <div class="row-track" id="track-1">
                    <!-- Photo cards injected dynamically by JS -->
                </div>
            </div>

            <!-- Row 2: Sliding Right -->
            <div class="marquee-row row-right" id="row-2">
                <div class="row-track" id="track-2">
                    <!-- Photo cards injected dynamically by JS -->
                </div>
            </div>

            <!-- Row 3: Sliding Left -->
            <div class="marquee-row row-left" id="row-3">
                <div class="row-track" id="track-3">
                    <!-- Photo cards injected dynamically by JS -->
                </div>
            </div>

        </section>

    </main>

    <!-- Fullscreen Lightbox Preview Modal -->
    <div class="lightbox-modal" id="lightbox-modal" role="dialog" aria-modal="true">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close Preview">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        
        <div class="lightbox-content">
            <img src="" id="lightbox-img" alt="Large Album Preview">
        </div>
    </div>
